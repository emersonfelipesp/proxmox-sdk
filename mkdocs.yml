site_name: Proxmox OpenAPI
site_url: https://emersonfelipesp.github.io/proxmox-openapi/
site_description: Schema-driven FastAPI package for Proxmox API with OpenAPI generation, mock data, and real API connections
site_author: Emerson Felipe
repo_url: https://github.com/emersonfelipesp/proxmox-openapi
repo_name: emersonfelipesp/proxmox-openapi
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: orange
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: orange
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

hooks:
  - docs/hooks.py

nav:
  - Home: index.md
  - Getting Started:
      - Installation: installation.md
      - Quick Start: quickstart.md
  - SDK Guide:
      - Overview: sdk-guide.md
      - Authentication & Sessions: sdk-authentication.md
      - Virtual Machines: sdk-virtual-machines.md
      - Examples & Recipes: sdk-examples.md
  - API Modes:
      - SDK Mock Usage: sdk-mock.md
      - Mock API Mode: mock-api.md
      - Real API Mode: real-api.md
      - API Reference: api-reference.md
  - Development:
      - Contributing: development.md
      - Architecture: architecture.md
  - Reference:
      - CLI Command Captures: reference/command-capture/index.md
      - pvesh: reference/PVESH.md
      - proxmoxer: reference/proxmoxer.md
  - FAQ: faq.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - pymdownx.details
  - tables
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - toc:
      permalink: true

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/emersonfelipesp/proxmox-openapi
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/proxmox-openapi/
  version:
    provider: mike

copyright: Copyright &copy; 2024 Emerson Felipe
