# Three Alpine-based images: raw (uvicorn), nginx (nginx+mkcert+uvicorn), granian (granian+mkcert).
# Triggers:
# - workflow_call: CI (main/testing) and release → always build, test, push (parallel jobs).
# - workflow_dispatch: manual — test-only (no Hub) or full publish (parallel jobs, same as call).
name: Docker images

on:
  workflow_call:
    inputs:
      source_ref:
        description: Branch, tag, or SHA to build
        type: string
        required: false
        default: ""
      mode:
        description: >-
          build-and-test-only — amd64 build + in-container tests, no Docker Hub.
          publish — build, smoke-test, and push raw + nginx + granian images.
        type: string
        required: false
        default: publish
      release:
        description: >-
          true — Release mode: push version tag + latest.
          false (default) — Dev mode: push dev tag only.
        type: boolean
        required: false
        default: false
  workflow_dispatch:
    inputs:
      source_ref:
        description: Branch, tag, or SHA to build
        type: string
        required: true
        default: main
      mode:
        description: >-
          build-and-test-only — amd64 build + in-container tests, no Docker Hub.
          publish — same as CI/release (push raw + nginx + granian, multi-arch).
        type: choice
        required: true
        options:
          - build-and-test-only
          - publish
        default: build-and-test-only

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Sequential local test (manual); no registry login or push.
  docker-manual:
    if: inputs.mode == 'build-and-test-only'
    name: Docker — build and test only (manual)
    runs-on: ubuntu-latest
    steps:
      - name: Resolve checkout ref
        id: checkout_source
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_REF: ${{ inputs.source_ref != '' && inputs.source_ref || github.sha }}
        run: |
          set -euo pipefail
          encoded_ref="$(python3 - <<'PY'
          import os
          from urllib.parse import quote

          print(quote(os.environ["SOURCE_REF"], safe=""))
          PY
          )"
          sha="$(gh api "repos/${{ github.repository }}/commits/$encoded_ref" --jq .sha)"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.checkout_source.outputs.sha }}

      - name: Validate pyproject version vs tag ref
        id: version
        env:
          GIT_REF: ${{ inputs.source_ref != '' && inputs.source_ref || github.sha }}
        run: |
          python3 <<'PY'
          import os
          import pathlib
          import tomllib

          git_ref = os.environ["GIT_REF"].strip()
          version = tomllib.loads(
              pathlib.Path("pyproject.toml").read_text(encoding="utf-8")
          )["project"]["version"]
          expected_tag = f"v{version}"
          if git_ref.startswith("v") and git_ref != expected_tag:
              raise SystemExit(
                  f"git_ref/version mismatch: ref={git_ref!r}, expected {expected_tag!r}"
              )
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"tag={version}\n")
          PY

      - name: Keep image tag in env
        run: echo "IMAGE_TAG=${{ steps.version.outputs.tag }}" >> $GITHUB_ENV

      - name: Create Docker test script
        run: |
          cat <<'EOF' > /tmp/docker-tests.sh
          #!/bin/sh
          set -eux
          # tests/ is bind-mounted read-only; keep bytecode out of the tree
          export PYTHONPYCACHEPREFIX=/tmp/pycache
          mkdir -p "$PYTHONPYCACHEPREFIX"
          uv sync --frozen --extra test --group dev
          uv run ruff check .
          uv run ruff format --check .
          uv run python -m compileall proxmox_openapi tests
          uv run python -c "import proxmox_openapi.main"
          uv run python -c "import proxmox_openapi.mock_main"
          uv run pytest --cov=proxmox_openapi --cov-report=term-missing --cov-report=xml tests
          EOF
          chmod +x /tmp/docker-tests.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      # --- raw image ---
      - name: Build amd64 raw image for in-container tests
        uses: docker/build-push-action@v6
        with:
          context: .
          target: raw
          platforms: linux/amd64
          push: false
          load: true
          tags: emersonfelipesp/proxmox-openapi:${{ env.IMAGE_TAG }}-raw-pre
          cache-from: type=gha,scope=raw
          cache-to: type=gha,mode=max,scope=raw

      - name: Run tests in raw image
        run: |
          docker run --rm \
            -w /workspace \
            -v /tmp/docker-tests.sh:/tmp/docker-tests.sh \
            -v "${{ github.workspace }}:/workspace" \
            emersonfelipesp/proxmox-openapi:${{ env.IMAGE_TAG }}-raw-pre \
            /tmp/docker-tests.sh

      - name: Smoke-test raw image startup
        run: |
          set -eux
          docker rm -f proxmox-openapi-smoke-raw 2>/dev/null || true
          docker run -d --name proxmox-openapi-smoke-raw \
            -p 127.0.0.1:18080:8000 \
            emersonfelipesp/proxmox-openapi:${{ env.IMAGE_TAG }}-raw-pre
          for i in $(seq 1 40); do
            if curl -fsS --max-time 5 http://127.0.0.1:18080/ >/dev/null 2>&1; then
              docker rm -f proxmox-openapi-smoke-raw
              exit 0
            fi
            sleep 2
          done
          docker logs proxmox-openapi-smoke-raw
          docker rm -f proxmox-openapi-smoke-raw
          exit 1

      # --- nginx image ---
      - name: Build amd64 nginx image for in-container tests
        uses: docker/build-push-action@v6
        with:
          context: .
          target: nginx
          platforms: linux/amd64
          push: false
          load: true
          tags: emersonfelipesp/proxmox-openapi:${{ env.IMAGE_TAG }}-nginx-pre
          cache-from: type=gha,scope=nginx
          cache-to: type=gha,mode=max,scope=nginx

      - name: Run tests in nginx image
        run: |
          docker run --rm \
            -w /workspace \
            -v /tmp/docker-tests.sh:/tmp/docker-tests.sh \
            -v "${{ github.workspace }}:/workspace" \
            emersonfelipesp/proxmox-openapi:${{ env.IMAGE_TAG }}-nginx-pre \
            /tmp/docker-tests.sh

      - name: Smoke-test nginx image startup
        run: |
          set -eux
          docker rm -f proxmox-openapi-smoke-nginx 2>/dev/null || true
          docker run -d --name proxmox-openapi-smoke-nginx \
            -p 127.0.0.1:18443:8000 \
            emersonfelipesp/proxmox-openapi:${{ env.IMAGE_TAG }}-nginx-pre
          for i in $(seq 1 40); do
            if curl -kfsS --max-time 5 https://127.0.0.1:18443/ >/dev/null 2>&1; then
              docker rm -f proxmox-openapi-smoke-nginx
              exit 0
            fi
            sleep 2
          done
          docker logs proxmox-openapi-smoke-nginx
          docker rm -f proxmox-openapi-smoke-nginx
          exit 1

      # --- granian image ---
      - name: Build amd64 granian image for in-container tests
        uses: docker/build-push-action@v6
        with:
          context: .
          target: granian
          platforms: linux/amd64
          push: false
          load: true
          tags: emersonfelipesp/proxmox-openapi:${{ env.IMAGE_TAG }}-granian-pre
          cache-from: type=gha,scope=granian
          cache-to: type=gha,mode=max,scope=granian

      - name: Run tests in granian image
        run: |
          docker run --rm \
            -w /workspace \
            -v /tmp/docker-tests.sh:/tmp/docker-tests.sh \
            -v "${{ github.workspace }}:/workspace" \
            emersonfelipesp/proxmox-openapi:${{ env.IMAGE_TAG }}-granian-pre \
            /tmp/docker-tests.sh

      - name: Smoke-test granian image startup
        run: |
          set -eux
          docker rm -f proxmox-openapi-smoke-granian 2>/dev/null || true
          docker run -d --name proxmox-openapi-smoke-granian \
            -p 127.0.0.1:18444:8000 \
            emersonfelipesp/proxmox-openapi:${{ env.IMAGE_TAG }}-granian-pre
          for i in $(seq 1 40); do
            if curl -kfsS --max-time 5 https://127.0.0.1:18444/ >/dev/null 2>&1; then
              docker rm -f proxmox-openapi-smoke-granian
              exit 0
            fi
            sleep 2
          done
          docker logs proxmox-openapi-smoke-granian
          docker rm -f proxmox-openapi-smoke-granian
          exit 1

  # Parallel publish jobs — one per image variant.
  docker-raw:
    if: inputs.mode == 'publish'
    name: Docker Hub — raw (uvicorn only, HTTP)
    runs-on: ubuntu-latest
    steps:
      - name: Resolve checkout ref
        id: checkout_source
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_REF: ${{ inputs.source_ref != '' && inputs.source_ref || github.sha }}
        run: |
          set -euo pipefail
          encoded_ref="$(python3 - <<'PY'
          import os
          from urllib.parse import quote

          print(quote(os.environ["SOURCE_REF"], safe=""))
          PY
          )"
          sha="$(gh api "repos/${{ github.repository }}/commits/$encoded_ref" --jq .sha)"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.checkout_source.outputs.sha }}

      - name: Resolve source revision
        id: source
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve image version from pyproject
        id: version
        env:
          GIT_REF: ${{ inputs.source_ref != '' && inputs.source_ref || github.ref_name }}
        run: |
          python3 <<'PY'
          import os
          import pathlib
          import tomllib

          data = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))
          version = data["project"]["version"]
          expected_tag = f"v{version}"
          git_ref = os.environ["GIT_REF"].strip()
          if git_ref.startswith("v") and git_ref != expected_tag:
              raise SystemExit(
                  f"git ref / pyproject mismatch: ref={git_ref!r}, expected {expected_tag!r}"
              )
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"tag={version}\n")
          PY

      - name: Keep image tag in env
        run: echo "IMAGE_TAG=${{ steps.version.outputs.tag }}" >> $GITHUB_ENV

      - name: Build amd64 raw image for pre-release tests
        uses: docker/build-push-action@v6
        with:
          context: .
          target: raw
          platforms: linux/amd64
          push: false
          load: true
          tags: emersonfelipesp/proxmox-openapi:${{ env.IMAGE_TAG }}-raw-pre
          cache-from: type=gha,scope=raw
          cache-to: type=gha,mode=max,scope=raw

      - name: Smoke-test raw image before push
        run: |
          set -eux
          docker rm -f proxmox-openapi-smoke-raw 2>/dev/null || true
          docker run -d --name proxmox-openapi-smoke-raw \
            -p 127.0.0.1:18080:8000 \
            emersonfelipesp/proxmox-openapi:${{ env.IMAGE_TAG }}-raw-pre
          for i in $(seq 1 40); do
            if curl -fsS --max-time 5 http://127.0.0.1:18080/ >/dev/null 2>&1; then
              docker rm -f proxmox-openapi-smoke-raw
              exit 0
            fi
            sleep 2
          done
          docker logs proxmox-openapi-smoke-raw
          docker rm -f proxmox-openapi-smoke-raw
          exit 1

      - name: Build and push raw Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: raw
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ inputs.release && format('emersonfelipesp/proxmox-openapi:{0}', env.IMAGE_TAG) || '' }}
            ${{ inputs.release && 'emersonfelipesp/proxmox-openapi:latest' || '' }}
            emersonfelipesp/proxmox-openapi:dev
            emersonfelipesp/proxmox-openapi:sha-${{ steps.source.outputs.sha }}
          cache-from: type=gha,scope=raw
          cache-to: type=gha,mode=max,scope=raw

      - name: Smoke-test pushed raw images
        run: |
          set -eux
          TAGS="${{ env.IMAGE_TAG }} dev sha-${{ steps.source.outputs.sha }}"
          if ${{ inputs.release }}; then
            TAGS="$TAGS latest"
          fi
          for TAG in $TAGS; do
            NAME=$(printf 'proxmox-openapi-smoke-%s' "$TAG" | tr '.:' '-')
            docker rm -f "$NAME" 2>/dev/null || true
            docker run -d --name "$NAME" \
              -p 127.0.0.1:18080:8000 \
              emersonfelipesp/proxmox-openapi:"$TAG"
            ok=0
            for i in $(seq 1 40); do
              if curl -fsS --max-time 5 http://127.0.0.1:18080/ >/dev/null 2>&1; then
                ok=1
                break
              fi
              sleep 2
            done
            if [ "$ok" -ne 1 ]; then
              docker logs "$NAME"
              docker rm -f "$NAME"
              exit 1
            fi
            docker rm -f "$NAME"
          done

