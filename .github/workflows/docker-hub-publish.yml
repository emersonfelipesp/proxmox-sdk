          done
          docker logs proxmox-openapi-smoke-nginx
          docker rm -f proxmox-openapi-smoke-nginx
          exit 1

      - name: Build and push nginx Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: nginx
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ inputs.release && format('emersonfelipesp/proxmox-openapi:{0}-nginx', env.IMAGE_TAG) || '' }}
            ${{ inputs.release && 'emersonfelipesp/proxmox-openapi:latest-nginx' || '' }}
            emersonfelipesp/proxmox-openapi:dev-nginx
            emersonfelipesp/proxmox-openapi:sha-${{ steps.source.outputs.sha }}-nginx
          cache-from: type=gha,scope=nginx
          cache-to: type=gha,mode=max,scope=nginx

      - name: Smoke-test pushed nginx images
        run: |
          set -eux
          TAGS="${{ env.IMAGE_TAG }}-nginx dev-nginx sha-${{ steps.source.outputs.sha }}-nginx"
          if ${{ inputs.release }}; then
            TAGS="$TAGS latest-nginx"
          fi
          for TAG in $TAGS; do
