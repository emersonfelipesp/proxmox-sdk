name: Deploy Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for git info plugin

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Sync documentation dependencies
        run: |
          uv sync --frozen --extra cli --group docs

      - name: Docgen pre-check (must pass before deploy)
        run: |
          uv run proxmox docs generate-capture --max-lines 200 --max-chars 120000
          test -f docs/generated/proxmox-command-capture.md
          test -f docs/generated/raw/index.json

      - name: Build docs pre-check
        run: uv run mkdocs build --strict

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy to GitHub Pages
        run: uv run mkdocs gh-deploy --force --clean --verbose
