name: CI

on:
  push:
    branches: [main, testing, "v*"]
  pull_request:
    branches: [main, testing, "v*"]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --frozen --group dev

      - name: Run ruff check
        run: uv run ruff check .

      - name: Run ruff format check
        run: uv run ruff format --check .

  syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --frozen --extra test --group dev

      - name: Compile package
        run: uv run python -m compileall proxmox_openapi tests

      - name: Import smoke checks
        run: |
          uv run python -c "import proxmox_openapi.main"
          uv run python -c "import proxmox_openapi.mock_main"

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --frozen --extra test --group dev

      - name: Run mocked schema-driven tests
        run: uv run pytest -n auto --cov=proxmox_openapi --cov-report=term-missing --cov-report=xml tests

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: proxmox-openapi-coverage
          path: coverage.xml

  docker-images:
    name: Publish Docker images (Hub)
    needs: [lint, syntax, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != ''
    uses: ./.github/workflows/docker-hub-publish.yml
    with:
      source_ref: ${{ github.sha }}
      mode: publish
    secrets: inherit